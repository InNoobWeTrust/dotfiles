# Hermes Agent configuration
# Managed via GNU Stow from dotfiles repo.
# Stow: cd ~/Developer/InNoobWeTrust/dotfiles && stow --target=$HOME .

# ── Main Model ─────────────────────────────────────────────────────────
model:
  default: claude-sonnet-4.6
  provider: copilot
  base_url: https://api.githubcopilot.com
  api_mode: chat_completions

# ── Custom Providers ────────────────────────────────────────────────────
# Adapted from ~/.config/kilo/kilo.jsonc provider definitions.
#
# Env vars required (set in ~/.hermes/.env or shell profile):
#   LLM_GATEWAY_BASE_URL  — shared base URL for oai-gateway and llm-gateway
#   LLM_GATEWAY_API_KEY   — shared API key for oai-gateway and llm-gateway
#   LLM_BROKER_BASE_URL   — base URL for llm-broker
#   LLM_BROKER_API_KEY    — API key for llm-broker
#
# Usage examples:
#   hermes chat -q "..." --provider custom:oai-gateway
#   hermes chat -q "..." --provider custom:llm-gateway
#   hermes chat -q "..." --provider custom:llm-broker
#
# Or set as main model:
#   hermes config set model.provider custom:llm-broker
#   hermes config set model.default claude-sonnet-4-6
#
custom_providers:
  # ── oai-gateway (OpenAI-compatible, LLM Gateway) ──
  - name: oai-gateway
    base_url: "${LLM_GATEWAY_BASE_URL}"
    key_env: LLM_GATEWAY_API_KEY
    models:
      openai/chatbot-5.4-high:
        context_length: 1000000
      openai/chatgpt-5.4-mini:
        context_length: 400000

  # ── llm-gateway (OpenAI-compatible, LLM Gateway — same endpoint, more models) ──
  - name: llm-gateway
    base_url: "${LLM_GATEWAY_BASE_URL}"
    key_env: LLM_GATEWAY_API_KEY
    models:
      kCode:
        context_length: 92160
      qwen/qwen3.6-plus:
        context_length: 128000
      deepseek/deepseek-v4-flash:
        context_length: 1048576

  # ── llm-broker (OpenAI-compatible, LLM Broker) ──
  - name: llm-broker
    base_url: "${LLM_BROKER_BASE_URL}"
    key_env: LLM_BROKER_API_KEY
    models:
      claude-sonnet-4-6:
        context_length: 900000
      claude-haiku-4-5:
        context_length: 180000
      gpt-5.4:
        context_length: 1000000

